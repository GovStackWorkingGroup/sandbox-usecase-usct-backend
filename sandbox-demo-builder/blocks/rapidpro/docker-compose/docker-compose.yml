version: '3.3'
services:
  nginx:
    image: nginx
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
    ports:
      - 80:80

  postgres:
    image: ghcr.io/baosystems/postgis:15-3.3 # see https://github.com/postgis/docker-postgis/issues/216
    volumes:
      - ./postgres/init_dbs.sql:/docker-entrypoint-initdb.d/dev_dbs.sql
      - postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=tembatemba
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s


  redis:
    image: redis:6.2-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis:/data
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s

  minio:
    image: bitnami/minio:latest
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio:/data
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=tembatemba
      - MINIO_DEFAULT_BUCKETS=temba-attachments,temba-sessions,temba-logs,temba-archives
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  rapidpro:
    image: nyaruka/rapidpro:stable
    build:
      context: ./rapidpro/
      args:
        - RAPIDPRO_TAG=v9.2.5
    command: ["webapp"]
    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - 8000:8000
    environment:
      - MAILROOM_URL=http://mailroom:8090
    healthcheck:
      test: curl -s http://localhost:8000 >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s




volumes:
  postgres:
    driver: local

  redis:
    driver: local
  minio:
    driver: local
